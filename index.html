<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nesne Bul Oyunu 🔍</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700&display=swap');

  :root {
    --gold: #FFD700;
    --dark: #1a1a2e;
    --panel: #16213e;
    --accent: #e94560;
    --green: #0f9b58;
    --purple: #7c3aed;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--dark);
    font-family: 'Nunito', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
    background-image: radial-gradient(ellipse at top, #16213e 0%, #0f0e17 100%);
  }

  h1 {
    font-family: 'Fredoka One', cursive;
    color: var(--gold);
    font-size: 2.2rem;
    text-shadow: 0 0 20px rgba(255,215,0,0.5);
    margin-bottom: 6px;
    letter-spacing: 1px;
  }

  .subtitle {
    color: #8899bb;
    font-size: 0.9rem;
    margin-bottom: 20px;
  }



  .game-layout {
    display: flex;
    gap: 20px;
    width: 100%;
    max-width: 1200px;
    align-items: flex-start;
  }

  .side-panel {
    width: 240px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .score-box {
    background: var(--panel);
    border: 2px solid #2a2a4a;
    border-radius: 14px;
    padding: 14px 18px;
    text-align: center;
  }
  .score-label { color: #8899bb; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; }
  .score-value {
    font-family: 'Fredoka One', cursive;
    font-size: 2.5rem;
    color: var(--gold);
    line-height: 1;
    margin: 4px 0;
  }
  .score-sub { color: #556688; font-size: 0.8rem; }

  .target-box {
    background: var(--panel);
    border: 2px solid #2a2a4a;
    border-radius: 14px;
    padding: 16px;
  }
  .target-title {
    font-size: 0.7rem;
    color: #8899bb;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-bottom: 10px;
  }

  .target-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    border-radius: 10px;
    margin-bottom: 8px;
    border: 2px solid transparent;
    transition: all 0.3s;
  }
  .target-item.active {
    background: rgba(233, 69, 96, 0.15);
    border-color: var(--accent);
    animation: pulse 2s infinite;
  }
  .target-item.found {
    background: rgba(15, 155, 88, 0.15);
    border-color: var(--green);
    opacity: 0.7;
  }
  .target-item.pending {
    background: rgba(255,255,255,0.03);
    border-color: #2a2a4a;
  }

  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(233,69,96,0.4); }
    50% { box-shadow: 0 0 0 6px rgba(233,69,96,0); }
  }

  .item-icon { font-size: 1.4rem; }
  .item-name { font-size: 0.85rem; font-weight: 700; color: #dde; }
  .item-status { margin-left: auto; font-size: 1rem; }

  .game-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .image-container {
    position: relative;
    border-radius: 16px;
    overflow: hidden;
    border: 3px solid #2a2a4a;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    cursor: crosshair;
    line-height: 0;
  }
  .image-container img {
    width: 100%;
    height: auto;
    display: block;
    transition: filter 0.3s;
  }
  .image-container.loading img { filter: brightness(0.5); }

  #click-ring {
    position: absolute;
    width: 60px;
    height: 60px;
    border: 3px solid var(--accent);
    border-radius: 50%;
    pointer-events: none;
    display: none;
    box-shadow: 0 0 20px var(--accent);
  }
  #click-ring.show {
    display: block;
    animation: ringAnim 0.6s forwards;
  }
  @keyframes ringAnim {
    0%   { transform: translate(-50%, -50%) scale(0); opacity: 1; }
    100% { transform: translate(-50%, -50%) scale(1.8); opacity: 0; }
  }

  .found-marker {
    position: absolute;
    width: 40px;
    height: 40px;
    border: 3px solid var(--green);
    border-radius: 50%;
    pointer-events: none;
    transform: translate(-50%, -50%);
    box-shadow: 0 0 15px var(--green);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.2rem;
    background: rgba(15,155,88,0.2);
    animation: foundBounce 0.5s ease;
  }
  @keyframes foundBounce {
    0%   { transform: translate(-50%, -50%) scale(0); }
    60%  { transform: translate(-50%, -50%) scale(1.3); }
    100% { transform: translate(-50%, -50%) scale(1); }
  }

  .status-bar {
    background: var(--panel);
    border: 2px solid #2a2a4a;
    border-radius: 12px;
    padding: 12px 18px;
    min-height: 58px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .status-icon { font-size: 1.4rem; flex-shrink: 0; }
  .status-text { color: #ccd; font-size: 0.9rem; line-height: 1.4; }
  .status-text strong { color: var(--gold); }

  .loading-dots::after {
    content: '';
    animation: dots 1.5s infinite;
  }
  @keyframes dots {
    0%  { content: '.'; }
    33% { content: '..'; }
    66% { content: '...'; }
  }

  .hint-area { display: flex; gap: 10px; }

  .hint-btn {
    background: rgba(124, 58, 237, 0.2);
    border: 2px solid var(--purple);
    color: #bba6ff;
    padding: 8px 16px;
    border-radius: 10px;
    cursor: pointer;
    font-family: 'Nunito', sans-serif;
    font-weight: 700;
    font-size: 0.82rem;
    transition: all 0.2s;
    flex: 1;
  }
  .hint-btn:hover { background: rgba(124,58,237,0.4); }

  .new-game-btn {
    background: rgba(233, 69, 96, 0.2);
    border: 2px solid var(--accent);
    color: #ff8099;
    padding: 8px 16px;
    border-radius: 10px;
    cursor: pointer;
    font-family: 'Nunito', sans-serif;
    font-weight: 700;
    font-size: 0.82rem;
    transition: all 0.2s;
    flex: 1;
  }
  .new-game-btn:hover { background: rgba(233,69,96,0.4); }



  .upload-area {
    background: var(--panel);
    border: 2px dashed #3a3a5a;
    border-radius: 14px;
    padding: 16px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s;
  }
  .upload-area:hover { border-color: var(--accent); }
  .upload-area input { display: none; }
  .upload-label { color: #8899bb; font-size: 0.8rem; cursor: pointer; }
  .upload-label strong { color: var(--accent); }

  .win-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 100;
    align-items: center;
    justify-content: center;
    animation: fadeIn 0.5s ease;
  }
  .win-overlay.show { display: flex; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  .win-card {
    background: var(--panel);
    border: 3px solid var(--gold);
    border-radius: 24px;
    padding: 40px 60px;
    text-align: center;
    box-shadow: 0 0 80px rgba(255,215,0,0.3);
  }
  .win-emoji { font-size: 4rem; }
  .win-title { font-family: 'Fredoka One', cursive; font-size: 2.5rem; color: var(--gold); margin: 10px 0; }
  .win-sub { color: #8899bb; margin-bottom: 20px; }
  .play-again-btn {
    background: var(--gold);
    color: var(--dark);
    border: none;
    padding: 14px 36px;
    border-radius: 50px;
    font-family: 'Fredoka One', cursive;
    font-size: 1.2rem;
    cursor: pointer;
    transition: transform 0.2s;
  }
  .play-again-btn:hover { transform: scale(1.05); }

  @media (max-width: 768px) {
    .game-layout { flex-direction: column; }
    .side-panel { width: 100%; }
    h1 { font-size: 1.6rem; }
  }
</style>
</head>
<body>

<h1>🔍 Nesne Bul Oyunu</h1>
<p class="subtitle">Görselde gizli nesneleri bul — tıkla, AI doğrulasın!</p>

<div class="game-layout">
  <div class="side-panel">
    <div class="score-box">
      <div class="score-label">Puan</div>
      <div class="score-value" id="score">0</div>
      <div class="score-sub" id="progress">0 / 0 bulundu</div>
    </div>

    <div class="target-box">
      <div class="target-title">🎯 Bulunacak Nesneler</div>
      <div id="target-list"></div>
    </div>

    <div class="hint-area">
      <button class="hint-btn" onclick="getHint()">💡 İpucu</button>
      <button class="new-game-btn" onclick="resetGame()">🔄 Yenile</button>
    </div>

    <div class="upload-area" onclick="document.getElementById('imgUpload').click()">
      <input type="file" id="imgUpload" accept="image/*" onchange="loadNewImage(event)">
      <div class="upload-label">📁 <strong>Kendi görselini yükle</strong><br>veya varsayılanı kullan</div>
    </div>

  </div>

  <div class="game-area">
    <div class="image-container" id="imageContainer" onclick="handleClick(event)">
      <img id="gameImage" src="sample-image.jpg" alt="Oyun görseli" crossorigin="anonymous">
      <div id="click-ring"></div>
    </div>

    <div class="status-bar">
      <div class="status-icon" id="statusIcon">🖱️</div>
      <div class="status-text" id="statusText">
        <strong>Aktif nesneye</strong> tıkla! Sol panelde parlayan nesneyi görselde bul.
      </div>
    </div>
  </div>
</div>

<div class="win-overlay" id="winOverlay">
  <div class="win-card">
    <div class="win-emoji">🏆</div>
    <div class="win-title">Tebrikler!</div>
    <div class="win-sub" id="winScore">Tüm nesneleri buldun!</div>
    <button class="play-again-btn" onclick="resetGame()">Tekrar Oyna</button>
  </div>
</div>

<script>
// ─── CONFIG ───────────────────────────────────────────────────────────────────
const API_MODEL = "claude-sonnet-4-20250514";

// Default fallback objects (replaced by AI analysis on startup)
let OBJECTS = [
  { id: 1, name: "Laptop / Bilgisayar", emoji: "💻", found: false },
  { id: 2, name: "Kauçuk Ördek",        emoji: "🦆", found: false },
  { id: 3, name: "Küre / Dünya",        emoji: "🌍", found: false },
  { id: 4, name: "Kedi",                emoji: "🐱", found: false },
  { id: 5, name: "Dürbün",              emoji: "🔭", found: false },
  { id: 6, name: "Kupa / Ödül",         emoji: "🏆", found: false },
  { id: 7, name: "Keman",               emoji: "🎻", found: false },
  { id: 8, name: "Kuş Kafesi",          emoji: "🐦", found: false },
];

let currentTarget = 0;
let score = 0;
let isLoading = false;
let imageBase64 = "";

// ─── IMAGE LOADING ────────────────────────────────────────────────────────────
function loadNewImage(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    imageBase64 = e.target.result.split(',')[1];
    document.getElementById('gameImage').src = e.target.result;
    document.querySelectorAll('.found-marker').forEach(m => m.remove());
    analyzeImageForObjects();
  };
  reader.readAsDataURL(file);
}

function imageToBase64(imgElement) {
  return new Promise((resolve) => {
    const canvas = document.createElement('canvas');
    canvas.width  = imgElement.naturalWidth;
    canvas.height = imgElement.naturalHeight;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(imgElement, 0, 0);
    resolve(canvas.toDataURL('image/jpeg', 0.85).split(',')[1]);
  });
}

// ─── AI HELPERS ───────────────────────────────────────────────────────────────
async function callClaude(messages, maxTokens = 500) {
  const response = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "anthropic-version": "2023-06-01",
      "anthropic-dangerous-direct-browser-access": "true"
    },
    body: JSON.stringify({ model: API_MODEL, max_tokens: maxTokens, messages })
  });
  const data = await response.json();
  if (data.error) throw new Error(data.error.message);
  return data.content.map(i => i.text || "").join("").trim();
}

// ─── ANALYZE IMAGE ────────────────────────────────────────────────────────────
async function analyzeImageForObjects() {
  setStatus("🔎", '<strong>Görsel analiz ediliyor</strong>, nesneler tespit ediliyor<span class="loading-dots"></span>');

  try {
    const text = await callClaude([{
      role: "user",
      content: [
        { type: "image", source: { type: "base64", media_type: "image/jpeg", data: imageBase64 } },
        { type: "text", text: `Bu görseldeki nesneleri listele. 8 tane belirgin, bulması eğlenceli nesne seç. Sadece JSON döndür, başka hiçbir şey yazma. Format: [{"name": "Türkçe nesne adı", "emoji": "emoji", "hint": "görselin hangi bölgesinde (sol üst, sağ alt, ortada vb.)"}, ...]` }
      ]
    }], 1000);

    const clean = text.replace(/```json|```/g, "").trim();
    const parsed = JSON.parse(clean);

    OBJECTS = parsed.map((o, i) => ({
      id: i + 1,
      name: o.name,
      emoji: o.emoji || "🔍",
      hint: o.hint || "",
      found: false
    }));

    resetGame(false);
  } catch (err) {
    console.error(err);
    setStatus("⚠️", "Analiz başarısız. Varsayılan nesneler kullanılıyor.");
    resetGame(false);
  }
}

// ─── GAME LOGIC ───────────────────────────────────────────────────────────────
function resetGame(reanalyze = true) {
  score = 0;
  currentTarget = 0;
  OBJECTS.forEach(o => o.found = false);
  document.querySelectorAll('.found-marker').forEach(m => m.remove());
  document.getElementById('winOverlay').classList.remove('show');
  updateScore();
  buildTargetList();
  setStatus("🖱️", '<strong>Aktif nesneye</strong> tıkla! Sol panelde parlayan nesneyi görselde bul.');
  if (reanalyze && imageBase64) analyzeImageForObjects();
}

function buildTargetList() {
  const list = document.getElementById('target-list');
  list.innerHTML = '';
  OBJECTS.forEach((obj, idx) => {
    const div = document.createElement('div');
    div.className = `target-item ${obj.found ? 'found' : idx === currentTarget ? 'active' : 'pending'}`;
    div.id = `target-${obj.id}`;
    div.innerHTML = `
      <span class="item-icon">${obj.emoji}</span>
      <span class="item-name">${obj.name}</span>
      <span class="item-status">${obj.found ? '✅' : idx === currentTarget ? '👆' : '⬜'}</span>
    `;
    list.appendChild(div);
  });
}

function updateScore() {
  const found = OBJECTS.filter(o => o.found).length;
  document.getElementById('score').textContent = score;
  document.getElementById('progress').textContent = `${found} / ${OBJECTS.length} bulundu`;
}

function setStatus(icon, text) {
  document.getElementById('statusIcon').textContent = icon;
  document.getElementById('statusText').innerHTML = text;
}

// ─── CLICK HANDLER ────────────────────────────────────────────────────────────
async function handleClick(event) {
  if (isLoading) return;

  const target = OBJECTS[currentTarget];
  if (!target || target.found) return;

  const container = document.getElementById('imageContainer');
  const img = document.getElementById('gameImage');
  const rect = img.getBoundingClientRect();

  const x = event.clientX - rect.left;
  const y = event.clientY - rect.top;
  const relX = x / rect.width;
  const relY = y / rect.height;

  showRing(x, y);

  const cropSize = 0.25;
  const cropX = Math.max(0, relX - cropSize / 2);
  const cropY = Math.max(0, relY - cropSize / 2);
  const cropW = Math.min(1 - cropX, cropSize);
  const cropH = Math.min(1 - cropY, cropSize);

  const croppedBase64 = await cropImage(imageBase64, cropX, cropY, cropW, cropH);

  isLoading = true;
  container.classList.add('loading');
  setStatus("🤖", `<strong>AI kontrol ediyor</strong>: "${target.name}" bu bölgede mi<span class="loading-dots"></span>`);

  try {
    const answer = await callClaude([{
      role: "user",
      content: [
        { type: "image", source: { type: "base64", media_type: "image/jpeg", data: croppedBase64 } },
        { type: "text", text: `Bu görsel, büyük bir görselin kırpılmış bölümüdür. Bu bölümde "${target.name}" (${target.emoji}) nesnesi var mı? Çok kısa yanıtla. İlk kelime EVET veya HAYIR olsun, sonra 1 cümle açıklama yaz.` }
      ]
    }], 300);

    container.classList.remove('loading');
    isLoading = false;

    const isFound = answer.toUpperCase().startsWith("EVET");

    if (isFound) {
      target.found = true;
      score += 100;
      placeFoundMarker(relX * rect.width, relY * rect.height, target.emoji);

      let next = currentTarget + 1;
      while (next < OBJECTS.length && OBJECTS[next].found) next++;
      currentTarget = next;

      updateScore();
      buildTargetList();

      if (OBJECTS.every(o => o.found)) {
        setTimeout(() => {
          document.getElementById('winScore').textContent = `Tüm nesneleri buldun! Toplam puan: ${score} 🎉`;
          document.getElementById('winOverlay').classList.add('show');
        }, 800);
      } else {
        const nextObj = OBJECTS[currentTarget];
        setStatus("✅", `Harika! <strong>${target.name}</strong> bulundu! Şimdi <strong>${nextObj?.name}</strong> nesnesini bul.`);
      }
    } else {
      setStatus("❌", `<strong>Burada yok.</strong> ${answer.replace(/^hayir[.!]?\s*/i, '')} Tekrar dene!`);
    }

  } catch (err) {
    console.error(err);
    container.classList.remove('loading');
    isLoading = false;
    setStatus("⚠️", `Hata: ${err.message}. Tekrar dene.`);
  }
}

// ─── HINT ─────────────────────────────────────────────────────────────────────
async function getHint() {
  const target = OBJECTS[currentTarget];
  if (!target || !imageBase64) return;

  if (target.hint) {
    setStatus("💡", `İpucu: <strong>${target.name}</strong> → ${target.hint}`);
    return;
  }

  setStatus("🤖", `<strong>İpucu alınıyor</strong><span class="loading-dots"></span>`);

  try {
    const hint = await callClaude([{
      role: "user",
      content: [
        { type: "image", source: { type: "base64", media_type: "image/jpeg", data: imageBase64 } },
        { type: "text", text: `Görselde "${target.name}" nesnesi nerede? Spoiler vermeden sadece genel bir yön söyle (örn: "sol tarafta, alt bölümde"). Türkçe, 1 kısa cümle.` }
      ]
    }], 200);

    target.hint = hint;
    setStatus("💡", `İpucu: <strong>${target.name}</strong> → ${hint}`);
  } catch {
    setStatus("⚠️", "İpucu alınamadı.");
  }
}

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function showRing(x, y) {
  const ring = document.getElementById('click-ring');
  ring.style.left = x + 'px';
  ring.style.top  = y + 'px';
  ring.classList.remove('show');
  void ring.offsetWidth;
  ring.classList.add('show');
}

function placeFoundMarker(x, y, emoji) {
  const container = document.getElementById('imageContainer');
  const marker = document.createElement('div');
  marker.className = 'found-marker';
  marker.style.left = x + 'px';
  marker.style.top  = y + 'px';
  marker.textContent = emoji;
  container.appendChild(marker);
}

async function cropImage(base64, relX, relY, relW, relH) {
  return new Promise((resolve) => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      const cw = img.width  * relW;
      const ch = img.height * relH;
      canvas.width  = cw;
      canvas.height = ch;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, img.width * relX, img.height * relY, cw, ch, 0, 0, cw, ch);
      resolve(canvas.toDataURL('image/jpeg', 0.85).split(',')[1]);
    };
    img.src = 'data:image/jpeg;base64,' + base64;
  });
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
async function initGame() {
  buildTargetList();
  updateScore();

  const img = document.getElementById('gameImage');

  const loadAndAnalyze = async () => {
    try {
      imageBase64 = await imageToBase64(img);
      await analyzeImageForObjects();
    } catch {
      setStatus("⚠️", "Görsel yüklenemedi. Kendi görselini yükle.");
      resetGame(false);
    }
  };

  if (img.complete && img.naturalWidth > 0) {
    await loadAndAnalyze();
  } else {
    img.addEventListener('load', loadAndAnalyze, { once: true });
    img.addEventListener('error', () => {
      setStatus("⚠️", "Görsel yüklenemedi. 📁 Kendi görselini yükle.");
      resetGame(false);
    }, { once: true });
  }
}

window.addEventListener('load', () => {
  initGame();
});
</script>
</body>
</html>
